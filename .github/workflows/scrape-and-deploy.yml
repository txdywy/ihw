name: Scrape & Deploy Hot Wheels Hub

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual trigger
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scrape.js
        timeout-minutes: 15

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet _data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Commit data updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/
          git commit -m "🔄 Update Hot Wheels data $(date -u '+%Y-%m-%d %H:%M')"
          git push

  deploy:
    needs: [scrape]
    if: always() && (needs.scrape.result == 'success' || needs.scrape.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          # Copy site files
          cp -r site/* _site/
          # Copy data files into site
          mkdir -p _site/data
          cp _data/*.json _site/data/ 2>/dev/null || true
          # Copy images
          mkdir -p _site/images
          cp -r images/* _site/images/ 2>/dev/null || true
          # Copy assets
          cp -r assets/* _site/ 2>/dev/null || true
          echo "Build complete. Files:"
          find _site -type f | head -30

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp _data/*.json _site/data/ 2>/dev/null || true
          mkdir -p _site/images
          cp -r images/* _site/images/ 2>/dev/null || true
          cp -r assets/* _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
